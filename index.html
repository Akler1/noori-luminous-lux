    <!-- ─────────────────────────────────────────────────────────────────────
         Analytics queue stubs (synchronous, ~1 KB)

         These define dataLayer/gtag, fbq, ttq, clarity, and _learnq queues
         immediately so React code can call them at any time without errors.
         Calls get queued in arrays. The actual SDK <script> tags are loaded
         later (see deferred loader below) — when each SDK boots, it drains
         its queue and processes the buffered calls. This keeps the main
         thread free during initial render → big PageSpeed/LCP/TBT win.
    ───────────────────────────────────────────────────────────────────── -->
    <script>
      window.dataLayer = window.dataLayer || [];
      window.gtag = function(){ dataLayer.push(arguments); };
      gtag('js', new Date());
      gtag('config', 'G-WRT4F0QL8X');

      // Meta Pixel queue stub
      !function(f,b,e,v,n){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];}
      (window,document);
      fbq('init', '1668658824143891');
      fbq('track', 'PageView');

      // TikTok Pixel queue stub
      !function (w, d, t) {
        w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];
        ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie","holdConsent","revokeConsent","grantConsent"];
        ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};
        for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);
      }(window, document, 'ttq');
      ttq.page();

      // Klaviyo queue stub (so klaviyo-tracking.ts can push immediately)
      window._learnq = window._learnq || [];

      // Microsoft Clarity queue stub
      (function(c,l,a){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};})
      (window, document, "clarity");
    </script>

    <!-- Deferred analytics SDK loader — fires after the page is idle so
         the user-facing render isn't blocked by parsing tracker scripts.
         All earlier gtag()/fbq()/ttq()/clarity()/_learnq pushes are queued
         and replayed when each SDK initializes. -->
    <script>
      (function(){
        function load(src, attrs){
          var s = document.createElement('script');
          s.async = true;
          s.src = src;
          if (attrs) for (var k in attrs) s.setAttribute(k, attrs[k]);
          document.head.appendChild(s);
        }
        function boot(){
          load('https://www.googletagmanager.com/gtag/js?id=G-WRT4F0QL8X');
          load('https://connect.facebook.net/en_US/fbevents.js');
          load('https://analytics.tiktok.com/i18n/pixel/events.js?sdkid=D7HSK33C77UBV63HRL7G&lib=ttq');
          load('https://www.clarity.ms/tag/wdq1pu8qot');
          load('https://static.klaviyo.com/onsite/js/klaviyo.js?company_id=XGWREq', { type: 'application/javascript' });
        }
        // Wait for the page to be interactive, then idle, then load the SDKs.
        // Fallback: 2.5s timeout in case requestIdleCallback never fires.
        function schedule(){
          if ('requestIdleCallback' in window) {
            requestIdleCallback(boot, { timeout: 3000 });
          } else {
            setTimeout(boot, 2500);
          }
        }
        if (document.readyState === 'complete') {
          schedule();
        } else {
          window.addEventListener('load', schedule, { once: true });
        }
      })();
    </script>
